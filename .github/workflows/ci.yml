name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run type checking
        run: bun run typecheck

      - name: Run type-level API tests
        run: bun run test:types

      - name: Run JavaScript tests
        run: bun run test

      - name: Run JavaScript tests with coverage
        run: bun run test:coverage

      - name: Run benchmark regression checks
        run: bun run benchmark

      - name: Setup CMake (for C++ tests)
        run: |
          cmake --version
          gcc --version || clang --version || echo "C++ compiler available"

      - name: Run C++ tests
        run: bun run test:cpp

      - name: Build packages
        run: bun run build

      - name: Verify build artifacts
        run: |
          # Check that lib directories were created
          [ -d "packages/react-native-nitro-storage/lib" ] || exit 1
          # Check that TypeScript definitions exist
          [ -f "packages/react-native-nitro-storage/lib/typescript/index.d.ts" ] || exit 1
          # Check that all build targets exist
          [ -d "packages/react-native-nitro-storage/lib/commonjs" ] || exit 1
          [ -d "packages/react-native-nitro-storage/lib/module" ] || exit 1
          echo "✅ Build artifacts verified"

      - name: Test package packaging
        run: |
          cd packages/react-native-nitro-storage
          bun run check:pack

  build-example-android:
    name: Android Example Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: bun install

      - name: Expo prebuild (Android)
        run: bun run example:prebuild:clean -- -- --platform android --non-interactive
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Gradle build check
        working-directory: apps/example/android
        run: ./gradlew assembleDebug --no-daemon -q

  build-example-ios:
    name: iOS Example Build
    runs-on: macos-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install

      - name: Expo prebuild (iOS)
        run: bun run example:prebuild:clean -- -- --platform ios --non-interactive
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Install CocoaPods
        working-directory: apps/example/ios
        run: pod install

      - name: Xcode build check
        working-directory: apps/example/ios
        run: |
          xcodebuild \
            -workspace NitroStorage.xcworkspace \
            -scheme NitroStorage \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            CODE_SIGNING_ALLOWED=NO \
            -quiet \
            build

appId: com.nitrostorage.example
name: "Secure Scope"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 5000

# Scroll to secure token input
- scrollUntilVisible:
    element:
      id: "secure-token-input"
    direction: DOWN
    timeout: 10000
    centerElement: true

# Enter token
- tapOn:
    id: "secure-token-input"
- eraseText: 50
- inputText: "secretabc"
- waitForAnimationToEnd
- hideKeyboard
- waitForAnimationToEnd

# Scroll to lock button and tap
- scrollUntilVisible:
    element:
      id: "secure-lock"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "secure-lock"
- waitForAnimationToEnd

# Assert encrypted value is visible
- assertVisible:
    id: "secure-encrypted-value"
    text: "secret...."

# Wipe and assert not visible
- tapOn:
    id: "secure-wipe"
- waitForAnimationToEnd

- assertNotVisible:
    id: "secure-encrypted-value"

appId: com.nitrostorage.example
---
- launchApp:
    clearState: true

# Navigate to Features tab
- tapOn: "Features"

# ─────────────────────────────────────────────
# Hooks card
# ─────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "ft-count-increment"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-count-increment"
- tapOn:
    id: "ft-count-increment"
- tapOn:
    id: "ft-count-increment"

- assertVisible:
    text: "count: 3"

- scrollUntilVisible:
    element:
      id: "ft-label-change"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-label-change"

# ─────────────────────────────────────────────
# Validation card
# ─────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "ft-age-input"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-age-input"
- eraseText: 50
- inputText: "25"
- hideKeyboard

- scrollUntilVisible:
    element:
      id: "ft-val-save"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-val-save"

- scrollUntilVisible:
    element:
      id: "ft-val-current"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "ft-val-current"
    text: "25"

# Type invalid value — validation should reject and keep 21 (or last valid)
- scrollUntilVisible:
    element:
      id: "ft-age-input"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-age-input"
- eraseText: 50
- inputText: "999"
- hideKeyboard

- scrollUntilVisible:
    element:
      id: "ft-val-save"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-val-save"

# 999 is out of range (13-120), so onValidationError returns 21
- scrollUntilVisible:
    element:
      id: "ft-val-current"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "ft-val-current"
    text: "21"

# Inject invalid raw value — recovered to 21
- scrollUntilVisible:
    element:
      id: "ft-val-inject"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-val-inject"

- scrollUntilVisible:
    element:
      id: "ft-val-current"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "ft-val-current"
    text: "21"

# ─────────────────────────────────────────────
# TTL Expiration card
# ─────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "ft-ttl-seed"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-ttl-seed"

- scrollUntilVisible:
    element:
      id: "ft-ttl-value"
    direction: DOWN
    timeout: 10000

# Value should be active (not expired) right after seeding
- assertNotVisible:
    id: "ft-ttl-value"
    text: "(expired)"

- scrollUntilVisible:
    element:
      id: "ft-ttl-refresh"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-ttl-refresh"

- scrollUntilVisible:
    element:
      id: "ft-ttl-value"
    direction: DOWN
    timeout: 10000

- assertNotVisible:
    id: "ft-ttl-value"
    text: "(expired)"

# ─────────────────────────────────────────────
# Transactions card
# ─────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "ft-tx-balance"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "ft-tx-balance"

- scrollUntilVisible:
    element:
      id: "ft-tx-commit"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-tx-commit"

- scrollUntilVisible:
    element:
      id: "ft-tx-log"
    direction: DOWN
    timeout: 10000

# Log should now show a timestamp entry (just assert element is visible)
- assertVisible:
    id: "ft-tx-log"

- scrollUntilVisible:
    element:
      id: "ft-tx-rollback"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-tx-rollback"

- scrollUntilVisible:
    element:
      id: "ft-tx-balance"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "ft-tx-balance"

- scrollUntilVisible:
    element:
      id: "ft-tx-clear"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-tx-clear"

- scrollUntilVisible:
    element:
      id: "ft-tx-log"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "ft-tx-log"
    text: "No log yet"

# ─────────────────────────────────────────────
# Migrations card
# ─────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "ft-mig-seed"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-mig-seed"

- scrollUntilVisible:
    element:
      id: "ft-mig-run"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-mig-run"

# After running migrations the name should be uppercased — assert the text appears
- assertVisible:
    text: "LEGACY-USER"

# ─────────────────────────────────────────────
# MMKV Migration card
# ─────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "ft-mmkv-seed"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-mmkv-seed"

- scrollUntilVisible:
    element:
      id: "ft-mmkv-migrate"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-mmkv-migrate"

- scrollUntilVisible:
    element:
      id: "ft-mmkv-target"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "ft-mmkv-target"
    text: "legacy-mmkv-value"

# ─────────────────────────────────────────────
# Custom Codec card
# ─────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "ft-codec-input"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-codec-input"
- eraseText: 50
- inputText: "my-item"
- hideKeyboard

- scrollUntilVisible:
    element:
      id: "ft-codec-save"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-codec-save"

- assertVisible:
    text: "my-item"

- scrollUntilVisible:
    element:
      id: "ft-codec-toggle"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-codec-toggle"

# After toggling, badge shows ENABLED (was DISABLED by default)
- assertVisible:
    text: "ENABLED"

# ─────────────────────────────────────────────
# Advanced Config card
# ─────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "ft-cache-bench"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-cache-bench"

# Benchmark result should contain "cached:"
- assertVisible:
    text: "cached:"

- scrollUntilVisible:
    element:
      id: "ft-burst-input"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-burst-input"
- eraseText: 50
- inputText: "test"
- hideKeyboard

- scrollUntilVisible:
    element:
      id: "ft-burst-single"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-burst-single"

- scrollUntilVisible:
    element:
      id: "ft-burst-value"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "ft-burst-value"
    text: "test"

- scrollUntilVisible:
    element:
      id: "ft-burst-triple"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ft-burst-triple"

- scrollUntilVisible:
    element:
      id: "ft-burst-value"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "ft-burst-value"
    text: "test-3"

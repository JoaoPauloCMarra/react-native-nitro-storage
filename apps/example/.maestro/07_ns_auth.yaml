appId: com.nitrostorage.example
name: "Namespaced Auth Storage"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 5000

# Scroll to namespaced auth set tokens button
- scrollUntilVisible:
    element:
      id: "ns-auth-set-tokens"
    direction: DOWN
    timeout: 10000
    centerElement: true

# Verify initial state is empty for both tokens
- assertVisible:
    id: "ns-auth-access-token-value"
    text: "(empty)"
- assertVisible:
    id: "ns-auth-refresh-token-value"
    text: "(empty)"

# Set tokens
- tapOn:
    id: "ns-auth-set-tokens"
- waitForAnimationToEnd

# Verify both tokens are no longer empty
- assertNotVisible:
    id: "ns-auth-access-token-value"
    text: "(empty)"
- assertNotVisible:
    id: "ns-auth-refresh-token-value"
    text: "(empty)"

# Clear namespace
- tapOn:
    id: "ns-auth-clear-namespace"
- waitForAnimationToEnd

# Verify both tokens are empty again
- assertVisible:
    id: "ns-auth-access-token-value"
    text: "(empty)"
- assertVisible:
    id: "ns-auth-refresh-token-value"
    text: "(empty)"

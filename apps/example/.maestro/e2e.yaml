appId: com.nitrostorage.example
name: "Nitro Storage - Full E2E"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 5000

# ── 1. Memory Scope ───────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "counter-value"
    direction: DOWN
    timeout: 10000
    centerElement: true
- assertVisible:
    id: "counter-value"
    text: "0"
- tapOn:
    id: "counter-increment"
- waitForAnimationToEnd
- tapOn:
    id: "counter-increment"
- waitForAnimationToEnd
- tapOn:
    id: "counter-increment"
- waitForAnimationToEnd
- assertVisible:
    id: "counter-value"
    text: "3"
- tapOn:
    id: "counter-decrement"
- waitForAnimationToEnd
- assertVisible:
    id: "counter-value"
    text: "2"
- tapOn:
    id: "counter-reset"
- waitForAnimationToEnd
- assertVisible:
    id: "counter-value"
    text: "0"

# ── 2. Disk Scope ─────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "disk-name-input"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "disk-name-input"
- eraseText: 50
- inputText: "alice"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "disk-save"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "disk-save"
- waitForAnimationToEnd
- assertVisible:
    id: "disk-stored-value"
    text: "alice"
- assertVisible:
    id: "disk-has-value"
    text: "true"
- tapOn:
    id: "disk-delete"
- waitForAnimationToEnd
- assertVisible:
    id: "disk-stored-value"
    text: "(empty)"
- assertVisible:
    id: "disk-has-value"
    text: "false"

# ── 3. Secure Scope ───────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "secure-token-input"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "secure-token-input"
- eraseText: 50
- inputText: "secretabc"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "secure-lock"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "secure-lock"
- waitForAnimationToEnd
- assertVisible:
    id: "secure-encrypted-value"
    text: "secret...."
- tapOn:
    id: "secure-wipe"
- waitForAnimationToEnd
- assertNotVisible:
    id: "secure-encrypted-value"

# ── 4. Namespaces ─────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "ns-pref-input"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "ns-pref-input"
- eraseText: 50
- inputText: "dark-mode"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "ns-save"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "ns-save"
- waitForAnimationToEnd
- assertVisible:
    id: "ns-pref-value"
    text: "dark-mode"
- tapOn:
    id: "ns-clear-namespace"
- waitForAnimationToEnd
- assertVisible:
    id: "ns-pref-value"
    text: "(empty)"

# ── 5. JSON Objects ───────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "json-theme-toggle"
    direction: DOWN
    timeout: 10000
    centerElement: true
- assertVisible: "DARK"
- tapOn:
    id: "json-theme-toggle"
- waitForAnimationToEnd
- assertVisible: "LIGHT"
- tapOn:
    id: "json-theme-toggle"
- waitForAnimationToEnd
- assertVisible: "DARK"
- scrollUntilVisible:
    element:
      id: "json-notif-toggle"
    direction: DOWN
    timeout: 10000
    centerElement: true
- assertVisible: "ON"
- tapOn:
    id: "json-notif-toggle"
- waitForAnimationToEnd
- assertVisible: "OFF"
- tapOn:
    id: "json-notif-toggle"
- waitForAnimationToEnd
- assertVisible: "ON"
- scrollUntilVisible:
    element:
      id: "json-config-code"
    direction: DOWN
    timeout: 10000
    centerElement: true
- assertVisible:
    id: "json-config-code"

# ── 6. Auth Storage Factory ───────────────────────────────────
- scrollUntilVisible:
    element:
      id: "auth-set-tokens"
    direction: DOWN
    timeout: 10000
    centerElement: true
- assertVisible:
    id: "auth-access-token-value"
    text: "(empty)"
- assertVisible:
    id: "auth-refresh-token-value"
    text: "(empty)"
- tapOn:
    id: "auth-set-tokens"
- waitForAnimationToEnd
- assertNotVisible:
    id: "auth-access-token-value"
    text: "(empty)"
- tapOn:
    id: "auth-clear"
- waitForAnimationToEnd
- assertVisible:
    id: "auth-access-token-value"
    text: "(empty)"
- assertVisible:
    id: "auth-refresh-token-value"
    text: "(empty)"

# ── 7. Namespaced Auth Storage ────────────────────────────────
- scrollUntilVisible:
    element:
      id: "ns-auth-set-tokens"
    direction: DOWN
    timeout: 10000
    centerElement: true
- assertVisible:
    id: "ns-auth-access-token-value"
    text: "(empty)"
- tapOn:
    id: "ns-auth-set-tokens"
- waitForAnimationToEnd
- assertNotVisible:
    id: "ns-auth-access-token-value"
    text: "(empty)"
- tapOn:
    id: "ns-auth-clear-namespace"
- waitForAnimationToEnd
- assertVisible:
    id: "ns-auth-access-token-value"
    text: "(empty)"

# ── 8. Storage Utils ──────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "util-disk-size"
    direction: DOWN
    timeout: 10000
    centerElement: true
- assertVisible:
    id: "util-disk-size"
- assertVisible:
    id: "util-memory-size"
- tapOn:
    id: "util-wipe-memory"
- waitForAnimationToEnd
- assertVisible:
    id: "util-memory-size"
    text: "0"
- tapOn:
    id: "util-wipe-disk"
- waitForAnimationToEnd
- assertVisible:
    id: "util-disk-size"
    text: "0"
- tapOn:
    id: "util-reset-all"
- waitForAnimationToEnd
- assertVisible:
    id: "util-disk-size"
    text: "0"
- assertVisible:
    id: "util-memory-size"
    text: "0"

# ── 9. Hooks ──────────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "hook-count-increment"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "hook-count-increment"
- waitForAnimationToEnd
- tapOn:
    id: "hook-count-increment"
- waitForAnimationToEnd
- tapOn:
    id: "hook-count-increment"
- waitForAnimationToEnd
- assertVisible:
    id: "hook-count-value"
    text: "3"
- tapOn:
    id: "hook-label-change"
- waitForAnimationToEnd
- assertVisible:
    id: "hook-label-value"

# ── 10. Validation ────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "val-age-input"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "val-age-input"
- eraseText: 50
- inputText: "25"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "val-save"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "val-save"
- waitForAnimationToEnd
- assertVisible:
    id: "val-current"
    text: "25"
- scrollUntilVisible:
    element:
      id: "val-age-input"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "val-age-input"
- eraseText: 50
- inputText: "999"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "val-save"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "val-save"
- waitForAnimationToEnd
- assertVisible:
    id: "val-current"
    text: "21"
- scrollUntilVisible:
    element:
      id: "val-inject"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "val-inject"
- waitForAnimationToEnd
- assertVisible:
    id: "val-current"
    text: "21"

# ── 11. TTL Expiration ────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "ttl-seed"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "ttl-seed"
- waitForAnimationToEnd
- assertNotVisible:
    id: "ttl-value"
    text: "(expired)"
- scrollUntilVisible:
    element:
      id: "ttl-refresh"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "ttl-refresh"
- waitForAnimationToEnd
- assertNotVisible:
    id: "ttl-value"
    text: "(expired)"

# ── 12. Transactions ──────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "tx-commit"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "tx-commit"
- waitForAnimationToEnd
- assertVisible:
    id: "tx-log"
- scrollUntilVisible:
    element:
      id: "tx-rollback"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "tx-rollback"
- waitForAnimationToEnd
- assertVisible:
    id: "tx-balance"
- scrollUntilVisible:
    element:
      id: "tx-clear"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "tx-clear"
- waitForAnimationToEnd
- assertVisible:
    id: "tx-log"
    text: "No log yet"

# ── 13. Migrations ────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "mig-seed"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "mig-seed"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: "mig-run"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "mig-run"
- waitForAnimationToEnd
- assertVisible: "LEGACY-USER"

# ── 14. Batch Operations ──────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "batch-v1"
    direction: DOWN
    timeout: 10000
    centerElement: true
- assertVisible:
    id: "batch-v1"
    text: "-"
- assertVisible:
    id: "batch-v2"
    text: "-"
- assertVisible:
    id: "batch-v3"
    text: "-"
- scrollUntilVisible:
    element:
      id: "batch-set"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "batch-set"
- waitForAnimationToEnd
- assertNotVisible:
    id: "batch-v1"
    text: "-"
- tapOn:
    id: "batch-get"
- waitForAnimationToEnd
- assertVisible: "Batch response"
- tapOn:
    id: "batch-remove"
- waitForAnimationToEnd
- assertVisible:
    id: "batch-v1"
    text: "-"

# ── 15. Scope Control ─────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "scope-disk-keys"
    direction: DOWN
    timeout: 10000
    centerElement: true
- assertVisible:
    id: "scope-disk-keys"
- assertVisible:
    id: "scope-memory-keys"
- scrollUntilVisible:
    element:
      id: "scope-clear-disk"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "scope-clear-disk"
- waitForAnimationToEnd
- assertVisible:
    id: "scope-disk-keys"
    text: "0"
- tapOn:
    id: "scope-clear-memory"
- waitForAnimationToEnd
- assertVisible:
    id: "scope-memory-keys"
    text: "0"
- tapOn:
    id: "scope-reset-all"
- waitForAnimationToEnd
- assertVisible:
    id: "scope-disk-keys"
    text: "0"
- assertVisible:
    id: "scope-memory-keys"
    text: "0"

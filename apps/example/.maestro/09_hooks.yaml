appId: com.nitrostorage.example
name: "Hooks"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 5000

# Scroll to hook-count-increment
- scrollUntilVisible:
    element:
      id: "hook-count-increment"
    direction: DOWN
    timeout: 10000
    centerElement: true

# Tap increment 3 times
- tapOn:
    id: "hook-count-increment"
- waitForAnimationToEnd

- tapOn:
    id: "hook-count-increment"
- waitForAnimationToEnd

- tapOn:
    id: "hook-count-increment"
- waitForAnimationToEnd

# Assert count is 3
- assertVisible:
    id: "hook-count-value"
    text: "3"

# Change label
- tapOn:
    id: "hook-label-change"
- waitForAnimationToEnd

# Assert label is alpha
- assertVisible:
    id: "hook-label-value"
    text: "alpha"

# Scroll to theme selector
- scrollUntilVisible:
    element:
      id: "hook-selected-theme"
    direction: DOWN
    timeout: 10000
    centerElement: true

# Assert theme is dark
- assertVisible:
    id: "hook-selected-theme"
    text: "dark"

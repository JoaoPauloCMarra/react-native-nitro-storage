appId: com.nitrostorage.example
name: "Nitro Storage - Smoke Test"
---
- launchApp:
    clearState: true

# Scroll to the Smoke Test runner at the bottom. Fixed swipes are more stable
# on iOS because the button is exposed as accessibility text/resource-id but
# scrollUntilVisible can miss it inside the nested Expo scroll view.
- repeat:
    times: 7
    commands:
      - swipe:
          direction: UP

# Tap "Run All" to execute every smoke test
- tapOn:
    id: "smoke-run-all"

# Wait for the test run to complete (button text reverts to "Run All")
- extendedWaitUntil:
    visible:
      text: "Run All"
    timeout: 30000

# Assert no test failed
- assertNotVisible: "failed"

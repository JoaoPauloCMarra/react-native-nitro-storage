appId: com.nitrostorage.example
name: "Migrations"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 5000

# Seed legacy data
- scrollUntilVisible:
    element:
      id: "mig-seed"
    direction: DOWN
    timeout: 30000
    centerElement: true
- tapOn:
    id: "mig-seed"
- waitForAnimationToEnd

# Run migration
- scrollUntilVisible:
    element:
      id: "mig-run"
    direction: DOWN
    timeout: 30000
    centerElement: true
- tapOn:
    id: "mig-run"
- waitForAnimationToEnd

# Assert migration result
- assertVisible:
    id: "mig-result"
    text: "LEGACY-USER"

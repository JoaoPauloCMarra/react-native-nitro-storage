appId: com.nitrostorage.example
name: "Memory Scope"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 5000

# Assert initial counter value is 0
- assertVisible:
    id: "counter-value"
    text: "0"

# Tap increment 3 times
- tapOn:
    id: "counter-increment"
- waitForAnimationToEnd

- tapOn:
    id: "counter-increment"
- waitForAnimationToEnd

- tapOn:
    id: "counter-increment"
- waitForAnimationToEnd

# Assert counter value is 3
- assertVisible:
    id: "counter-value"
    text: "3"

# Tap decrement once
- tapOn:
    id: "counter-decrement"
- waitForAnimationToEnd

# Assert counter value is 2
- assertVisible:
    id: "counter-value"
    text: "2"

# Tap reset
- tapOn:
    id: "counter-reset"
- waitForAnimationToEnd

# Assert counter value is 0
- assertVisible:
    id: "counter-value"
    text: "0"

appId: com.nitrostorage.example
name: "Nitro Storage - Full E2E"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    point: "65,895"

# ── Memory Scope ──────────────────────────────────────────────
- assertVisible: "Memory Scope"
- assertVisible:
    id: "counter-value"
    text: "0"

- tapOn:
    id: "counter-increment"
- tapOn:
    id: "counter-increment"
- tapOn:
    id: "counter-increment"
- assertVisible:
    id: "counter-value"
    text: "3"

- tapOn:
    id: "counter-decrement"
- assertVisible:
    id: "counter-value"
    text: "2"

- tapOn:
    id: "counter-reset"
- assertVisible:
    id: "counter-value"
    text: "0"

# ── Disk Scope ────────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "disk-name-input"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "disk-name-input"
- eraseText: 50
- inputText: "alice"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "disk-save"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "disk-save"

- assertVisible:
    id: "disk-stored-value"
    text: "alice"
- assertVisible:
    id: "disk-has-value"
    text: "true"

- tapOn:
    id: "disk-delete"
- assertVisible:
    id: "disk-stored-value"
    text: "(empty)"
- assertVisible:
    id: "disk-has-value"
    text: "false"

# ── Secure Scope ──────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "secure-token-input"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "secure-token-input"
- eraseText: 50
- inputText: "secretabc"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "secure-lock"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "secure-lock"

- assertVisible:
    id: "secure-encrypted-value"
    text: "secret...."

- tapOn:
    id: "secure-wipe"
- assertNotVisible:
    id: "secure-encrypted-value"

# ── Namespaces ────────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "ns-pref-input"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "ns-pref-input"
- eraseText: 50
- inputText: "dark-mode"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "ns-save"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "ns-save"

- assertVisible:
    id: "ns-pref-value"
    text: "dark-mode"

- tapOn:
    id: "ns-clear-namespace"
- assertVisible:
    id: "ns-pref-value"
    text: "(empty)"

# ── JSON Objects ──────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "json-theme-toggle"
    direction: DOWN
    timeout: 10000

- assertVisible: "DARK"
- tapOn: "DARK"
- scrollUntilVisible:
    element:
      id: "json-theme-toggle"
    direction: DOWN
    timeout: 10000
- assertVisible: "LIGHT"
- tapOn: "LIGHT"
- scrollUntilVisible:
    element:
      id: "json-theme-toggle"
    direction: DOWN
    timeout: 10000
- assertVisible: "DARK"

- assertVisible: "ON"
- tapOn: "ON"
- scrollUntilVisible:
    element:
      id: "json-notif-toggle"
    direction: DOWN
    timeout: 10000
- assertVisible: "OFF"
- tapOn: "OFF"
- scrollUntilVisible:
    element:
      id: "json-notif-toggle"
    direction: DOWN
    timeout: 10000
- assertVisible: "ON"

- assertVisible:
    id: "json-config-code"

# ── Auth Storage Factory ──────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "auth-set-tokens"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "auth-access-token-value"
    text: "(empty)"
- assertVisible:
    id: "auth-refresh-token-value"
    text: "(empty)"

- tapOn:
    id: "auth-set-tokens"
- assertNotVisible:
    id: "auth-access-token-value"
    text: "(empty)"
- assertNotVisible:
    id: "auth-refresh-token-value"
    text: "(empty)"

- tapOn:
    id: "auth-clear"
- assertVisible:
    id: "auth-access-token-value"
    text: "(empty)"
- assertVisible:
    id: "auth-refresh-token-value"
    text: "(empty)"

# ── Namespaced Auth Storage ───────────────────────────────────
- scrollUntilVisible:
    element:
      id: "ns-auth-set-tokens"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "ns-auth-access-token-value"
    text: "(empty)"
- assertVisible:
    id: "ns-auth-refresh-token-value"
    text: "(empty)"

- tapOn:
    id: "ns-auth-set-tokens"
- assertNotVisible:
    id: "ns-auth-access-token-value"
    text: "(empty)"
- assertNotVisible:
    id: "ns-auth-refresh-token-value"
    text: "(empty)"

- tapOn:
    id: "ns-auth-clear-namespace"
- assertVisible:
    id: "ns-auth-access-token-value"
    text: "(empty)"
- assertVisible:
    id: "ns-auth-refresh-token-value"
    text: "(empty)"

# ── Storage Utilities ─────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "util-disk-size"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "util-disk-size"
- assertVisible:
    id: "util-memory-size"

- tapOn:
    id: "util-wipe-memory"
- assertVisible:
    id: "util-memory-size"
    text: "0"

- tapOn:
    id: "util-wipe-disk"
- assertVisible:
    id: "util-disk-size"
    text: "0"

- tapOn:
    id: "util-reset-all"
- assertVisible:
    id: "util-disk-size"
    text: "0"
- assertVisible:
    id: "util-memory-size"
    text: "0"

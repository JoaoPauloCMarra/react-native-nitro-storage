appId: com.nitrostorage.example
name: "Scope Control"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 5000

# Scroll to scope section and verify elements exist
- scrollUntilVisible:
    element:
      id: "scope-disk-keys"
    direction: DOWN
    timeout: 30000
    centerElement: true
- assertVisible:
    id: "scope-disk-keys"
- assertVisible:
    id: "scope-memory-keys"

# Clear disk scope
- scrollUntilVisible:
    element:
      id: "scope-clear-disk"
    direction: DOWN
    timeout: 30000
    centerElement: true
- tapOn:
    id: "scope-clear-disk"
- waitForAnimationToEnd
- assertVisible:
    id: "scope-disk-keys"
    text: "0"

# Clear memory scope
- tapOn:
    id: "scope-clear-memory"
- waitForAnimationToEnd
- assertVisible:
    id: "scope-memory-keys"
    text: "0"

# Reset all
- tapOn:
    id: "scope-reset-all"
- waitForAnimationToEnd
- assertVisible:
    id: "scope-disk-keys"
    text: "0"
- assertVisible:
    id: "scope-memory-keys"
    text: "0"

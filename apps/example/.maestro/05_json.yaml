appId: com.nitrostorage.example
name: "JSON Objects"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 5000

# Scroll to JSON theme toggle
- scrollUntilVisible:
    element:
      id: "json-theme-toggle"
    direction: DOWN
    timeout: 10000
    centerElement: true

# Verify initial state is DARK
- assertVisible:
    text: "DARK"

# Toggle theme to LIGHT
- tapOn:
    id: "json-theme-toggle"
- waitForAnimationToEnd

# Verify theme changed to LIGHT
- assertVisible:
    text: "LIGHT"

# Toggle theme back to DARK
- tapOn:
    id: "json-theme-toggle"
- waitForAnimationToEnd

# Verify theme changed back to DARK
- assertVisible:
    text: "DARK"

# Scroll to notification toggle
- scrollUntilVisible:
    element:
      id: "json-notif-toggle"
    direction: DOWN
    timeout: 10000
    centerElement: true

# Verify initial state is ON
- assertVisible:
    text: "ON"

# Toggle notifications to OFF
- tapOn:
    id: "json-notif-toggle"
- waitForAnimationToEnd

# Verify notifications changed to OFF
- assertVisible:
    text: "OFF"

# Toggle notifications back to ON
- tapOn:
    id: "json-notif-toggle"
- waitForAnimationToEnd

# Verify notifications changed back to ON
- assertVisible:
    text: "ON"

# Scroll to config code block
- scrollUntilVisible:
    element:
      id: "json-config-code"
    direction: DOWN
    timeout: 10000
    centerElement: true

# Verify config code block is visible
- assertVisible:
    id: "json-config-code"

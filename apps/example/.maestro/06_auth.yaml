appId: com.nitrostorage.example
name: "Auth Storage Factory"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 5000

# Scroll to auth set tokens button
- scrollUntilVisible:
    element:
      id: "auth-set-tokens"
    direction: DOWN
    timeout: 10000
    centerElement: true

# Verify initial state is empty
- assertVisible:
    id: "auth-access-token-value"
    text: "(empty)"
- assertVisible:
    id: "auth-refresh-token-value"
    text: "(empty)"

# Set tokens
- tapOn:
    id: "auth-set-tokens"
- waitForAnimationToEnd

# Verify access token is no longer empty
- assertNotVisible:
    id: "auth-access-token-value"
    text: "(empty)"

# Clear tokens
- tapOn:
    id: "auth-clear"
- waitForAnimationToEnd

# Verify tokens are empty again
- assertVisible:
    id: "auth-access-token-value"
    text: "(empty)"
- assertVisible:
    id: "auth-refresh-token-value"
    text: "(empty)"

appId: com.nitrostorage.example
name: "Validation"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 5000

# Scroll to age input
- scrollUntilVisible:
    element:
      id: "val-age-input"
    direction: DOWN
    timeout: 10000
    centerElement: true

# Enter valid age 25
- tapOn:
    id: "val-age-input"
- eraseText: 50
- inputText: "25"
- waitForAnimationToEnd
- hideKeyboard
- waitForAnimationToEnd

# Scroll to save and tap
- scrollUntilVisible:
    element:
      id: "val-save"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "val-save"
- waitForAnimationToEnd

# Assert current value is 25
- assertVisible:
    id: "val-current"
    text: "25"

# Scroll to age input again
- scrollUntilVisible:
    element:
      id: "val-age-input"
    direction: DOWN
    timeout: 10000
    centerElement: true

# Enter invalid age 999
- tapOn:
    id: "val-age-input"
- eraseText: 50
- inputText: "999"
- waitForAnimationToEnd
- hideKeyboard
- waitForAnimationToEnd

# Scroll to save and tap
- scrollUntilVisible:
    element:
      id: "val-save"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "val-save"
- waitForAnimationToEnd

# Assert current value falls back to default 21 (validation rejects 999)
- assertVisible:
    id: "val-current"
    text: "21"

# Scroll to inject and tap
- scrollUntilVisible:
    element:
      id: "val-inject"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "val-inject"
- waitForAnimationToEnd

# Assert current value is still 21
- assertVisible:
    id: "val-current"
    text: "21"

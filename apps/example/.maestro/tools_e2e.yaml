appId: com.nitrostorage.example
---
- launchApp:
    clearState: true

- tapOn: "Tools"

# ── Batch Operations ─────────────────────────────────────────────────────────

- scrollUntilVisible:
    element:
      id: "tools-batch-v1"
    direction: DOWN
    timeout: 10000

# Initial state: all values are the default "-"
- assertVisible:
    id: "tools-batch-v1"
    text: "-"
- assertVisible:
    id: "tools-batch-v2"
    text: "-"
- assertVisible:
    id: "tools-batch-v3"
    text: "-"

# Batch Set → values change away from "-"
- tapOn:
    id: "tools-batch-set"
- assertNotVisible:
    id: "tools-batch-v1"
    text: "-"
- assertNotVisible:
    id: "tools-batch-v2"
    text: "-"
- assertNotVisible:
    id: "tools-batch-v3"
    text: "-"

# Batch Get → "Batch response" block appears
- tapOn:
    id: "tools-batch-get"
- assertVisible: "Batch response"

# Batch Remove → values revert to "-"
- tapOn:
    id: "tools-batch-remove"
- assertVisible:
    id: "tools-batch-v1"
    text: "-"
- assertVisible:
    id: "tools-batch-v2"
    text: "-"
- assertVisible:
    id: "tools-batch-v3"
    text: "-"

# ── Secure Write Mode ─────────────────────────────────────────────────────────

- scrollUntilVisible:
    element:
      id: "tools-write-mode"
    direction: DOWN
    timeout: 10000

# Initial state: Sync (commit)
- assertVisible:
    id: "tools-write-mode"
    text: "Sync (commit)"

# Switch to Async
- tapOn:
    id: "tools-write-async"
- assertVisible:
    id: "tools-write-mode"
    text: "Async (apply)"

# Switch back to Sync
- tapOn:
    id: "tools-write-sync"
- assertVisible:
    id: "tools-write-mode"
    text: "Sync (commit)"

# ── Scope Control ─────────────────────────────────────────────────────────────

- scrollUntilVisible:
    element:
      id: "tools-disk-keys"
    direction: DOWN
    timeout: 10000

- assertVisible:
    id: "tools-disk-keys"
- assertVisible:
    id: "tools-memory-keys"

# Clear Disk scope
- scrollUntilVisible:
    element:
      id: "tools-clear-disk"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "tools-clear-disk"
- scrollUntilVisible:
    element:
      id: "tools-disk-keys"
    direction: DOWN
    timeout: 10000
- assertVisible:
    id: "tools-disk-keys"
    text: "0"

# Clear Memory scope
- scrollUntilVisible:
    element:
      id: "tools-clear-memory"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "tools-clear-memory"
- scrollUntilVisible:
    element:
      id: "tools-memory-keys"
    direction: DOWN
    timeout: 10000
- assertVisible:
    id: "tools-memory-keys"
    text: "0"

# Reset Everything
- scrollUntilVisible:
    element:
      id: "tools-reset-all"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "tools-reset-all"
- scrollUntilVisible:
    element:
      id: "tools-disk-keys"
    direction: DOWN
    timeout: 10000
- assertVisible:
    id: "tools-disk-keys"
    text: "0"
- assertVisible:
    id: "tools-memory-keys"
    text: "0"

appId: com.nitrostorage.example
---
- launchApp:
    clearState: true

- tapOn: "Perf"

# --- Memory scope ---
- scrollUntilVisible:
    element:
      id: "bench-run-memory"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "bench-run-memory"
- assertVisible:
    id: "bench-run-memory-write"
    timeout: 15000
- assertVisible:
    id: "bench-run-memory-read"
    timeout: 15000

# --- Disk scope ---
- scrollUntilVisible:
    element:
      id: "bench-run-disk"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "bench-run-disk"
- assertVisible:
    id: "bench-run-disk-write"
    timeout: 15000
- assertVisible:
    id: "bench-run-disk-read"
    timeout: 15000

# --- Secure scope ---
- scrollUntilVisible:
    element:
      id: "bench-run-secure"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "bench-run-secure"
- assertVisible:
    id: "bench-run-secure-write"
    timeout: 15000
- assertVisible:
    id: "bench-run-secure-read"
    timeout: 15000

# --- Stress Test All Scopes ---
- scrollUntilVisible:
    element:
      id: "bench-run-all"
    direction: UP
    timeout: 10000
- tapOn:
    id: "bench-run-all"
- assertVisible:
    id: "bench-run-memory-write"
    timeout: 30000
- assertVisible:
    id: "bench-run-memory-read"
    timeout: 30000
- assertVisible:
    id: "bench-run-disk-write"
    timeout: 30000
- assertVisible:
    id: "bench-run-disk-read"
    timeout: 30000
- assertVisible:
    id: "bench-run-secure-write"
    timeout: 30000
- assertVisible:
    id: "bench-run-secure-read"
    timeout: 30000

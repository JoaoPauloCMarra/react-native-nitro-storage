appId: com.nitrostorage.example
name: "Disk Scope"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 5000

# Scroll to make disk card fully visible
- scrollUntilVisible:
    element:
      id: "disk-has-value"
    direction: DOWN
    timeout: 30000
    centerElement: true

# Enter name — tap input, erase, type, then dismiss keyboard
- tapOn:
    id: "disk-name-input"
- eraseText: 50
- inputText: "alice"
- waitForAnimationToEnd
- hideKeyboard
- waitForAnimationToEnd

# Save
- tapOn:
    id: "disk-save"
- waitForAnimationToEnd:
    timeout: 2000

# Assert stored value and has value
- assertVisible:
    id: "disk-stored-value"
    text: "alice"
- assertVisible:
    id: "disk-has-value"
    text: "true"

# Delete and assert cleared
- tapOn:
    id: "disk-delete"
- waitForAnimationToEnd

- assertVisible:
    id: "disk-stored-value"
    text: "(empty)"
- assertVisible:
    id: "disk-has-value"
    text: "false"

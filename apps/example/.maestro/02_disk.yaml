appId: com.nitrostorage.example
name: "Disk Scope"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 5000

# Scroll to disk name input
- scrollUntilVisible:
    element:
      id: "disk-name-input"
    direction: DOWN
    timeout: 10000
    centerElement: true

# Enter name
- tapOn:
    id: "disk-name-input"
- eraseText: 50
- inputText: "alice"
- waitForAnimationToEnd
- hideKeyboard
- waitForAnimationToEnd

# Scroll to save button and tap
- scrollUntilVisible:
    element:
      id: "disk-save"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "disk-save"
- waitForAnimationToEnd

# Assert stored value and has value
- assertVisible:
    id: "disk-stored-value"
    text: "alice"
- assertVisible:
    id: "disk-has-value"
    text: "true"

# Delete and assert cleared
- tapOn:
    id: "disk-delete"
- waitForAnimationToEnd

- assertVisible:
    id: "disk-stored-value"
    text: "(empty)"
- assertVisible:
    id: "disk-has-value"
    text: "false"
